version: "3.9"

networks:
  zabbix-net:
    driver: bridge

volumes:
  pg_data:
  zbx_alertscripts:
  zbx_export:
  zbx_snmptraps:

services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: zabbix-postgres
    networks:
      - zabbix-net
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: CHANGE_ME_STRONG
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    networks:
      - zabbix-net
    depends_on:
      - postgres
    ports:
      - "10051:10051"
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: CHANGE_ME_STRONG

      # 🔥 tuning PRO
      ZBX_CACHESIZE: 512M
      ZBX_HISTORYCACHESIZE: 256M
      ZBX_TRENDCACHESIZE: 128M
      ZBX_VALUECACHESIZE: 256M
      ZBX_TIMEOUT: 10
    volumes:
      - zbx_alertscripts:/usr/lib/zabbix/alertscripts
      - zbx_export:/var/lib/zabbix/export
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    networks:
      - zabbix-net
    depends_on:
      - zabbix-server
      - postgres
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: CHANGE_ME_STRONG
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: Europe/Madrid
    restart: unless-stopped

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: zabbix-agent
    networks:
      - zabbix-net
    depends_on:
      - zabbix-server
    ports:
      - "10050:10050"
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_HOSTNAME: docker-host
    volumes:
      - /:/hostfs:ro
    privileged: true
    pid: "host"
    restart: unless-stopped

  snmptraps:
    image: zabbix/zabbix-snmptraps:alpine-7.0-latest
    container_name: zabbix-snmptraps
    networks:
      - zabbix-net
    depends_on:
      - zabbix-server
    ports:
      - "162:1162/udp"
    volumes:
      - zbx_snmptraps:/var/lib/zabbix/snmptraps
    environment:
      ZBX_SERVER_HOST: zabbix-server
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - zabbix-net
    depends_on:
      - zabbix-server
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: CHANGE_ME_STRONG
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
    restart: unless-stopped
